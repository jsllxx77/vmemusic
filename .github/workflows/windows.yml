name: Windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=true
          --output artifacts/vmemusic-win-x64

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/vmemusic-win-x64/* -DestinationPath artifacts/vmemusic-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmemusic-win-x64
          path: artifacts/vmemusic-win-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/vmemusic-win-x64.zip
